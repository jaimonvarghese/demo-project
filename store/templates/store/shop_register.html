{% extends 'store/base.html' %}
{% block title %}Register Your Shop – VigorCart{% endblock %}
{% block content %}
<section class="section">
    <div class="container" style="max-width:650px;">
        <div class="section-header">
            <div class="section-tag">Become a Vendor</div>
            <h1 class="section-title">Register Your Shop</h1>
            <p class="section-subtitle">Start selling on VigorCart. Fill in your shop details below.</p>
        </div>
        <div class="auth-card" style="max-width:100%;">
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label">Shop Name *</label>
                    <input type="text" name="name" class="form-input" placeholder="e.g. FitStore Pro" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Shop Email *</label>
                    <input type="email" name="email" class="form-input" placeholder="shop@email.com" required>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                    <div class="form-group">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" name="phone" class="form-input" placeholder="+91 XXXXX XXXXX">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Opening Hours</label>
                        <input type="text" name="hours" class="form-input" placeholder="e.g. 9 AM – 9 PM">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Location / Address *</label>
                    <input type="text" name="location" class="form-input" placeholder="e.g. MG Road, Bangalore"
                        required>
                </div>
                <button type="submit" class="btn btn-primary"
                    style="width:100%;margin-top:12px;justify-content:center;">Register Shop →</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
