{% extends 'store/base.html' %}
{% block title %}{{ action }} Product – VigorCart{% endblock %}
{% block content %}
<section class="section">
    <div class="container" style="max-width:700px;">
        <h1 class="section-title" style="margin-bottom:32px;">{{ action }} Product</h1>
        <div class="auth-card" style="max-width:100%;">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label">Product Name *</label>
                    <input type="text" name="p_name" class="form-input"
                        value="{% if product %}{{ product.p_name }}{% endif %}" placeholder="e.g. Whey Protein 1kg"
                        required>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-input" rows="3"
                        placeholder="Brief product description…">{% if product %}{{ product.description }}{% endif %}</textarea>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                    <div class="form-group">
                        <label class="form-label">Price (₹) *</label>
                        <input type="number" name="price" class="form-input"
                            value="{% if product %}{{ product.price }}{% endif %}" step="0.01" min="0"
                            placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Stock *</label>
                        <input type="number" name="stock" class="form-input"
                            value="{% if product %}{{ product.stock_availability }}{% endif %}" min="0" placeholder="0"
                            required>
                    </div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                    <div class="form-group">
                        <label class="form-label">Size</label>
                        <input type="text" name="size" class="form-input"
                            value="{% if product %}{{ product.size }}{% endif %}" placeholder="e.g. 1kg, XL, 500ml">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Category</label>
                        <select name="category" class="form-input">
                            <option value="">Select Category</option>
                            {% for cat in categories %}
                            <option value="{{ cat.id }}" {% if product and product.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Product Image</label>
                    <input type="file" name="image" class="form-input" accept="image/*" style="padding:12px;">
                    {% if product and product.image %}
                    <div style="margin-top:8px;font-size:0.82rem;color:var(--text-muted);">Current: {{ product.image.name }}</div>
                    {% endif %}
                </div>
                <div style="display:flex;gap:12px;margin-top:24px;">
                    <button type="submit" class="btn btn-primary" style="flex:1;justify-content:center;">{{ action }}
                        Product</button>
                    <a href="{% url 'manage_products' %}" class="btn btn-outline"
                        style="flex:1;justify-content:center;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
