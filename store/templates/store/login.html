{% extends 'store/base.html' %}
{% block title %}Login – VigorCart{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Login to your VigorCart account.</p>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-input" placeholder="your_username" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary"
                style="width:100%;justify-content:center;margin-top:8px;">Login →</button>
        </form>
        <div class="auth-footer">Don't have an account? <a href="{% url 'register' %}">Sign Up</a></div>
    </div>
</div>
{% endblock %}
