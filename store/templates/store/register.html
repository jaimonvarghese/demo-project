{% extends 'store/base.html' %}
{% block title %}Register – VigorCart{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Join thousands of fitness enthusiasts on VigorCart.</p>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-input" placeholder="your_username" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-input" placeholder="you@email.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Phone Number</label>
                <input type="tel" name="phone" class="form-input" placeholder="+91 XXXXX XXXXX">
            </div>
            <div class="form-group">
                <label class="form-label">Account Role</label>
                <select name="role" class="form-input" required>
                    <option value="customer" selected>Customer</option>
                    <option value="shop_owner">Shop Owner / Vendor</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirm_password" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary"
                style="width:100%;justify-content:center;margin-top:8px;">Create Account →</button>
        </form>
        <div class="auth-footer">Already have an account? <a href="{% url 'login' %}">Login</a></div>
    </div>
</div>
{% endblock %}
